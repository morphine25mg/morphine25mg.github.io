
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-sans,system-ui,sans-serif);}
#wrap{position:relative;height:100vh;min-height:640px;max-height:860px;}
#app,#admin-panel{display:flex;flex-direction:column;height:100%;border-radius:var(--border-radius-lg);overflow:hidden;border:0.5px solid var(--color-border-tertiary);}
#admin-panel{display:none;background:var(--color-background-tertiary);}

/* Header */
#hdr{background:linear-gradient(135deg,#1D9E75,#085041);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.lion-circle{width:44px;height:44px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,0.6);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.lion-circle img{width:44px;height:44px;object-fit:cover;display:block;}
#dot{position:absolute;bottom:1px;right:1px;width:9px;height:9px;border-radius:50%;background:#9FE1CB;border:2px solid #085041;}
#av-wrap{position:relative;flex-shrink:0;}
#hdr-info{flex:1;}
#hdr-name{font-size:15px;font-weight:500;color:#fff;}
#hdr-sub{font-size:11px;color:rgba(255,255,255,0.75);margin-top:1px;}
.hdr-btn{background:rgba(255,255,255,0.18);border:0.5px solid rgba(255,255,255,0.35);color:#fff;font-size:11px;padding:5px 9px;border-radius:14px;cursor:pointer;white-space:nowrap;}
.hdr-btn:hover{background:rgba(255,255,255,0.28);}

/* Chat */
#chat-area{flex:1;overflow-y:auto;padding:12px 11px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth;}
.msg-row{display:flex;gap:7px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}

/* Message avatar — lion circle */
.m-av{width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;background:#fff;border:1.5px solid #E1F5EE;display:flex;align-items:center;justify-content:center;}
.m-av img{width:34px;height:34px;object-fit:cover;display:block;}

.bubble{max-width:76%;padding:10px 13px;border-radius:18px;font-size:14px;line-height:1.55;color:var(--color-text-primary);}
.bubble.bot{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-bottom-left-radius:4px;}
.bubble.user{background:#0F6E56;color:#fff;border-bottom-right-radius:4px;}
.bubble a{color:#1D9E75;word-break:break-all;}
.bubble.user a{color:#9FE1CB;}
.bubble strong{font-weight:500;}
.time-lbl{font-size:11px;color:var(--color-text-tertiary);text-align:center;margin:2px 0;}

/* Typing */
.typing-dots{display:flex;gap:4px;padding:4px 2px;}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--color-text-tertiary);animation:blink 1.2s infinite;}
.typing-dots span:nth-child(2){animation-delay:.2s;}
.typing-dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,60%,100%{opacity:.25;transform:translateY(0);}30%{opacity:1;transform:translateY(-3px);}}

/* Feedback */
.fb-row{display:flex;gap:5px;margin-top:5px;align-items:center;flex-wrap:wrap;}
.fb-btn{font-size:12px;padding:3px 8px;border-radius:12px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;}
.fb-btn:hover{background:var(--color-background-secondary);}
.fb-btn.g{background:#E1F5EE;border-color:#1D9E75;color:#085041;}
.fb-btn.b{background:#FAECE7;border-color:#D85A30;color:#993C1D;}
.forward-btn{font-size:12px;padding:3px 8px;border-radius:12px;border:0.5px solid #AFA9EC;background:#EEEDFE;color:#3C3489;cursor:pointer;}
.forward-btn:hover{background:#CECBF6;}
.forward-btn.sent{background:#E1F5EE;border-color:#1D9E75;color:#085041;cursor:default;}

/* Quick chips — top 10 */
#chips-wrap{flex-shrink:0;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);}
#chips-header{display:flex;align-items:center;justify-content:space-between;padding:7px 11px 4px;}
#chips-label{font-size:11px;color:var(--color-text-tertiary);font-weight:500;letter-spacing:.3px;}
#chips{padding:0 11px 7px;display:flex;gap:5px;flex-wrap:wrap;}
.chip{font-size:12px;padding:5px 10px;border-radius:20px;border:0.5px solid #5DCAA5;color:#085041;background:#E1F5EE;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px;}
.chip:hover{background:#9FE1CB;}
.chip-rank{font-size:10px;background:#085041;color:#fff;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:500;}
.chip-count{font-size:10px;color:#0F6E56;opacity:0.7;}

/* Input */
#inp-area{display:flex;gap:7px;align-items:flex-end;padding:9px 11px 11px;background:var(--color-background-primary);flex-shrink:0;}
#msg-inp{flex:1;font-size:14px;padding:10px 13px;border-radius:22px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);resize:none;outline:none;min-height:40px;max-height:100px;line-height:1.4;font-family:inherit;}
#msg-inp:focus{border-color:#1D9E75;}
#msg-inp::placeholder{color:var(--color-text-tertiary);}
#send-btn{width:40px;height:40px;border-radius:50%;background:#1D9E75;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
#send-btn:hover{background:#085041;}
#send-btn:active{transform:scale(0.95);}

/* Admin */
#adm-hdr{background:linear-gradient(135deg,#534AB7,#3C3489);padding:11px 14px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
#adm-hdr span{font-size:15px;font-weight:500;color:#fff;flex:1;}
#adm-tabs{display:flex;flex-shrink:0;background:var(--color-background-primary);border-bottom:0.5px solid var(--color-border-tertiary);}
.atab{flex:1;padding:9px 3px;font-size:12px;text-align:center;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;}
.atab.on{color:#534AB7;border-bottom-color:#534AB7;font-weight:500;}
.atab:hover:not(.on){background:var(--color-background-secondary);}
#adm-body{flex:1;overflow-y:auto;padding:12px;}
#adm-body::-webkit-scrollbar{width:4px;}
#adm-body::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px;}
.sec-ttl{font-size:12px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;letter-spacing:.5px;}
.drop-z{border:1.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-lg);padding:18px;text-align:center;cursor:pointer;color:var(--color-text-secondary);font-size:13px;margin-bottom:9px;background:var(--color-background-secondary);}
.drop-z:hover,.drop-z.ov{border-color:#534AB7;background:#EEEDFE;color:#534AB7;}
.kb-ta{width:100%;font-size:13px;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);resize:vertical;min-height:70px;font-family:inherit;outline:none;margin-bottom:7px;}
.kb-ta:focus{border-color:#534AB7;}
.add-btn{width:100%;padding:9px;background:#534AB7;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;margin-bottom:11px;}
.add-btn:hover{background:#3C3489;}
.kb-item,.log-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:7px;}
.kb-hdr{display:flex;justify-content:space-between;align-items:flex-start;gap:7px;}
.kb-ttl{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1;}
.kb-date{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap;}
.kb-desc{font-size:12px;color:var(--color-text-secondary);margin-top:4px;line-height:1.4;}
.del-btn{background:none;border:none;color:var(--color-text-tertiary);cursor:pointer;font-size:16px;}
.del-btn:hover{color:#D85A30;}
.log-q{font-size:13px;font-weight:500;margin-bottom:3px;}
.log-a{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px;line-height:1.4;}
.log-meta{display:flex;gap:9px;align-items:center;font-size:11px;color:var(--color-text-tertiary);flex-wrap:wrap;}
.fb-badge{padding:2px 7px;border-radius:10px;font-size:11px;}
.fb-badge.g{background:#E1F5EE;color:#085041;}
.fb-badge.b{background:#FAECE7;color:#993C1D;}
.fb-badge.n{background:var(--color-background-secondary);}
.fb-badge.fwd{background:#EEEDFE;color:#3C3489;}
.stat-row{display:flex;gap:7px;margin-bottom:11px;}
.stat-card{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px;text-align:center;}
.stat-n{font-size:20px;font-weight:500;}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:2px;}
.empty{text-align:center;color:var(--color-text-tertiary);font-size:13px;padding:24px 0;}
.email-row{display:flex;gap:7px;align-items:center;margin-bottom:11px;}
.email-inp{flex:1;font-size:13px;padding:8px 11px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);outline:none;font-family:inherit;}
.email-inp:focus{border-color:#534AB7;}
.save-btn{padding:8px 14px;background:#534AB7;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:13px;cursor:pointer;white-space:nowrap;}
.save-btn:hover{background:#3C3489;}

/* Top10 admin table */
.top-item{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:9px 12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;}
.top-rank{width:24px;height:24px;border-radius:50%;background:#085041;color:#fff;font-size:12px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.top-rank.gold{background:#BA7517;}
.top-rank.silver{background:#888780;}
.top-rank.bronze{background:#7A4A2E;}
.top-q{flex:1;font-size:13px;color:var(--color-text-primary);}
.top-cnt{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;}

/* Login */
#login-ov{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;border-radius:var(--border-radius-lg);z-index:20;}
.lcard{background:var(--color-background-primary);border-radius:var(--border-radius-lg);padding:22px;width:250px;text-align:center;}
.lcard h3{font-size:15px;font-weight:500;margin-bottom:4px;}
.lcard p{font-size:12px;color:var(--color-text-secondary);margin-bottom:12px;}
.lcard input{width:100%;padding:10px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-primary);font-size:16px;text-align:center;letter-spacing:5px;outline:none;margin-bottom:9px;font-family:inherit;}
.lcard input:focus{border-color:#534AB7;}
.lcard button{width:100%;padding:10px;background:#534AB7;color:#fff;border:none;border-radius:var(--border-radius-md);font-size:14px;cursor:pointer;}
.lcard button:hover{background:#3C3489;}
.lerr{font-size:12px;color:#D85A30;margin-top:6px;}
#toast{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);background:#1D9E75;color:#fff;font-size:13px;padding:8px 16px;border-radius:20px;display:none;z-index:30;white-space:nowrap;}
#chat-area::-webkit-scrollbar{width:4px;}
#chat-area::-webkit-scrollbar-thumb{background:var(--color-border-secondary);border-radius:2px;}
</style>

<h2 class="sr-only">萌萌的東元獅 AICU問答機器人</h2>
<div id="wrap">
<div id="app">
  <div id="hdr">
    <div id="av-wrap">
      <div class="lion-circle" style="width:44px;height:44px;">
        <img id="lion-hdr" src="" alt="東元獅">
      </div>
      <div id="dot"></div>
    </div>
    <div id="hdr-info">
      <div id="hdr-name">萌萌的東元獅（問答機器）</div>
      <div id="hdr-sub">AICU 同仁專屬小幫手</div>
    </div>
    <button class="hdr-btn" onclick="showLogin()"><i class="ti ti-settings" style="font-size:12px;margin-right:3px" aria-hidden="true"></i>後台</button>
  </div>

  <div id="chat-area" role="log" aria-live="polite"></div>

  <div id="chips-wrap">
    <div id="chips-header">
      <span id="chips-label">🔥 熱門問答 TOP 10</span>
    </div>
    <div id="chips"></div>
  </div>

  <div id="inp-area">
    <textarea id="msg-inp" placeholder="輸入問題，東元獅來幫你🦁" rows="1" aria-label="輸入訊息"></textarea>
    <button id="send-btn" onclick="send()" aria-label="送出"><i class="ti ti-send" style="font-size:17px" aria-hidden="true"></i></button>
  </div>
</div>

<div id="admin-panel">
  <div id="adm-hdr">
    <i class="ti ti-settings" style="font-size:17px;color:#fff" aria-hidden="true"></i>
    <span>後台管理</span>
    <button class="hdr-btn" onclick="showChat()"><i class="ti ti-arrow-left" style="font-size:11px;margin-right:2px" aria-hidden="true"></i>返回</button>
  </div>
  <div id="adm-tabs">
    <div class="atab on" onclick="tab('kb')"><i class="ti ti-book" style="font-size:13px;margin-right:2px" aria-hidden="true"></i>知識庫</div>
    <div class="atab" onclick="tab('top')"><i class="ti ti-flame" style="font-size:13px;margin-right:2px" aria-hidden="true"></i>熱門排行</div>
    <div class="atab" onclick="tab('logs')"><i class="ti ti-messages" style="font-size:13px;margin-right:2px" aria-hidden="true"></i>問答記錄</div>
    <div class="atab" onclick="tab('fb')"><i class="ti ti-thumb-up" style="font-size:13px;margin-right:2px" aria-hidden="true"></i>回饋</div>
    <div class="atab" onclick="tab('cfg')"><i class="ti ti-mail" style="font-size:13px;margin-right:2px" aria-hidden="true"></i>設定</div>
  </div>
  <div id="adm-body"></div>
</div>

<div id="login-ov">
  <div class="lcard">
    <h3>🔐 後台登入</h3>
    <p>請輸入後台密碼</p>
    <input type="password" id="pw" maxlength="8" onkeydown="if(event.key==='Enter')doLogin()" placeholder="••••">
    <button onclick="doLogin()">登入後台</button>
    <div class="lerr" id="lerr"></div>
    <div style="margin-top:8px;"><button style="background:none;border:none;color:var(--color-text-secondary);font-size:12px;cursor:pointer;" onclick="hideLogin()">取消</button></div>
  </div>
</div>
<div id="toast"></div>
</div>

  {q:["在職進修","公假公費","報名費"],a:`【ICU在職進修 懶人包 🎓】\n\n❄️ **兩周前**：出「在職進修申請單」（附課表）\n✅ 注意：線上報名填抬頭「東元醫療社團法人東元綜合醫院」、統編 78025920\n\n✅ **前一個月**：預公假（ACLS 含在4天預假裡）\n\n✅ **出發前一周**：Key考勤「出差單」附課表\n\n✅ **當天出發**：發票打統編 78025920 / 高鐵票鉛筆寫名字 / 拿報名費收據\n\n✅ **上班日立繳 → 行政助理**：統編發票、高鐵票、報名費收據、上課證明、進修申請單影本、HR出差單、心得`},
  {q:["公出","出差","桃竹苗","住宿費","膳費","台北","高雄","出差費","報銷","幾天"],a:`**公出 vs 出差** ✈️\n\n📍 **公出**：赴桃竹苗區域內\n📍 **出差**：赴桃竹苗以外\n\n**公假計算**：台中以北推 ±2H（最早7點）；台中以南推 ±3H（最早6:30）；含中午扣1H用餐\n\n**住宿費**：一級主管上限 $2,000；院長核實報支\n**膳費**：8H全日；4~8H半日；未滿4H不得報\n**報銷期限**：國內銷差後 **14個工作天**；國外 **30個工作天**`},

  {q:["ZOLL","低溫","冷凝","幫浦","食道溫","排氣"],a:`**ZOLL 低溫治療要點 ❄️**\n\n🌡️ 接**食道溫**，用藍色延長線，妥善保管\n🔵 冷凝槽蓋子：開口蓋 **3點鐘方向**\n🔧 幫浦蓋：由右至左置放，右邊卡槽注意方向\n💨 排氣後：**prime 鍵關掉**（容易忘！）\n🔌 拔插頭前：先關機器後方電源開關`},
  {q:["密碼","電腦密碼","密碼規定","忘記密碼"],a:`**電腦密碼規定 🔒**\n\n至少 **12碼**，需包含：英文大寫、英文小寫、數字、特殊符號\n\n💡 範例：Aicu1213+1215\n\n⚠️ 容易被擋：與前兩次舊密碼太相似 / 含連續數字\n\n🆘 忘記密碼：重新申請流程繁瑣，改完務必記錄好！`},

  {q:["能力進階","進階","N4","學分","時數"],a:`**能力進階 懶人包 🍉**\n\n**時數（滿15H）**：網路上限10H / 單位內至少5H / 含跨領域 / 至少一堂院外（外傷/ACLS）/ 標四大類：專業、品質、倫理、法規\n\n**印積分**👉 https://nurse.mohw.gov.tw/sp-memb-stat-2.html\n\n**N4要求**：RRT 或 999 會議至少2場`},

  {q:["腹內壓","IAP","Foley","膀胱壓"],a:`**腹內壓（IAP）測量 🏥**\n\n器材：2-way 16號 Foley\n① 出口端先綁起來\n② 測壓組：模組CVC，壓力30\n③ 連接 Foley（穿刺軟橡膠頭）\n④ 歸零通大氣（對腋中線），病人平躺\n⑤ 注入 N/S **25mL**，在**吐氣末**讀取\n⑥ 測完放開出口端\n\n判讀：>15 mmHg ⚠️；>20 mmHg 🚨 考慮剖腹探查`},

  {q:["管路效期","管路","NG效期","CVC","Foley效期"],a:`**常見管路效期 🩺**\n\n| 管路 | 效期 | 照護 |\n|------|------|------|\n| Endo | 30日 | BID |\n| NG 一般 | 14日；矽質 30日 | QD |\n| Foley 一般 | 7日；矽質 30日 | QD |\n| IC / A-line | 3日 | p.r.n |\n| CVC | 7日（依醫囑） | Q7D |`},
  {q:["緊急應變","999","RRT","333","黑色","火災","斷氣"],a:`**AICU 緊急應變 🚨**\n\n🔴 **999/急救**：TeamI派資深護理師+醫師立即救援\n🟡 **RRT**：派護理師帶醫師，**30分鐘內**到\n🟤 **333/大量傷患**：派2名護理師+醫師，帶電擊器待命\n⚫ **黑色/暴力**：廣播「ICU黑色」，退到安全位置\n🟢 **綠色/火災**：通報119、主管(0927-505303)\n\n💨 **斷氣**：備6桶氧氣維持15分鐘；⚡ **斷電**：15秒恢復`},
  {q:["排班","預假","換班","護病比"],a:`**排班原則 📅**\n\n**護病比**：白/小夜/大夜班均 1:2-3\n\n**預假**：上限4天（假日≦2天）；1-5日完成預班；15日公布草稿；18日16:00公布正式\n\n**資深人力**：每班資深（年資>2年/ACLS/ICU training）達 **40%**`},
  {q:["生命徵象","vital signs","術後監測","心導管術後"],a:`**生命徵象監測常規 📊**\n\n| 情境 | 監測方式 |\n|------|----------|\n| 一般常規 | **Q1H** |\n| 手術室術後 | Q5分×1H→Q15分×4→Q30分×2→Q1H |\n| 心導管術後 | Q15分×4→Q30分×2→Q1H |\n| rt-PA後 | Q15分×8→Q30分×12→Q1H |\n| CPCR後 | Q5分×12或Q15分×8（依醫囑）|`},
  {q:["三班","工作職責","點班","急救車"],a:`**點班原則（7本點班本）**\n\n① 包布本 ② 儀器本 ③ 急救車 ④ 衛材本\n⑤ 常備藥+藥用冰箱 ⑥ 負壓隔離房 ⑦ 血糖機矯正（大夜）\n\n**急救車**：桌面禁放非配備物品 / 每班確認氧氣鋼瓶 >50Kg/cm²\n**藥用冰箱**：每班記錄溫度；每半個月（2日、16日）大夜除霜`},
];

// ── 熱門問答統計 ─────────────────────────────
const ALL_TOPICS = [
  {label:"🍉 能力進階", query:"能力進階"},
  {label:"📚 在職進修", query:"在職進修怎麼申請"},
  {label:"✈️ 出差/公出", query:"出差和公出有什麼不同"},
  {label:"🔒 密碼規定", query:"密碼規定"},
  {label:"🩺 管路效期", query:"管路效期"},
  {label:"🚨 緊急應變", query:"緊急應變怎麼辦"},
  {label:"📋 報告繳交", query:"案例報告什麼時候要繳"},
  {label:"📚 圖書館帳密", query:"圖書館帳號密碼"},
  {label:"🛡️ 病人暴力", query:"病人有暴力傾向怎麼辦"},
  {label:"❄️ ZOLL低溫", query:"ZOLL低溫治療操作"},
  {label:"🏥 腹內壓測量", query:"腹內壓怎麼測"},
  {label:"🧹 確診清消", query:"確診清消怎麼做"},
  {label:"📅 排班規則", query:"排班和預假規則"},
  {label:"📊 生命徵象", query:"生命徵象監測"},
  {label:"🩺 三班點班", query:"三班工作職責"},
];

let clickCounts = {};
ALL_TOPICS.forEach(t => { clickCounts[t.query] = 0; });

let kbItems=[], chatLogs=[], feedbacks=[], adminEmail='jljhong@tyh.com.tw', activeTab='kb', msgId=0;

const LION_HDR = 'data:image/png;base64,' + LION_HDR_B64;
const LION_AV  = 'data:image/png;base64,' + LION_AV_B64;

function initLionImgs() {
  const h = document.getElementById('lion-hdr');
  if (h) h.src = LION_HDR;
}

function getTop10() {
  return [...ALL_TOPICS]
    .sort((a,b) => (clickCounts[b.query]||0) - (clickCounts[a.query]||0))
    .slice(0, 10);
}

function renderChips() {
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';
  const top10 = getTop10();
  top10.forEach((item, i) => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    const cnt = clickCounts[item.query] || 0;
    btn.innerHTML = `<span class="chip-rank">${i+1}</span>${item.label}${cnt>0?` <span class="chip-count">×${cnt}</span>`:''}`;
    btn.onclick = () => qk(item.query);
    wrap.appendChild(btn);
  });
}

function fmt(t){return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/https?:\/\/[^\s\)]+/g,u=>`<a href="${u}" target="_blank">${u}</a>`).replace(/\n/g,'<br>');}

function findAnswer(q){const lo=q.toLowerCase();let best=null,score=0;for(const f of FAQ){const s=f.q.filter(k=>lo.includes(k)).length;if(s>score){score=s;best=f;}}for(const kb of kbItems){const kw=(kb.title+' '+kb.content).split(/[\s,，。、\n]+/);const s=kw.filter(k=>k&&lo.includes(k.toLowerCase())).length;if(s>score){score=s;best={a:'**'+kb.title+'**\n\n'+kb.content};}}return score>0?best.a:null;}

async function callClaude(msg){const kbStr=[...FAQ,...kbItems.map(k=>({q:[k.title],a:k.content}))].map((f,i)=>`${i+1}. 關鍵詞：${Array.isArray(f.q)?f.q.join('、'):f.q}\n回答：${f.a}`).join('\n\n---\n\n');try{const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,system:`你是「萌萌的東元獅」，東元醫院AICU問答機器人。以下知識庫回答問仁問題；若不在範圍，請回答：「此系統沒有具備此知識，建議洽詢主管或相關單位喔 🦁」\n\n知識庫：\n${kbStr}\n\n用繁體中文，格式清楚，適時加表情符號，精簡扼要。`,messages:[{role:'user',content:msg}]})});if(!r.ok)throw new Error();const d=await r.json();return(d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'此系統沒有具備此知識，建議洽詢主管或相關單位喔 🦁';}catch{return'此系統沒有具備此知識，建議洽詢主管或相關單位喔 🦁';}}

function makeAv(){const d=document.createElement('div');d.className='m-av';const i=document.createElement('img');i.src=LION_AV;i.alt='東元獅';d.appendChild(i);return d;}

function addMsg(txt,role,mid){const area=document.getElementById('chat-area');const row=document.createElement('div');row.className='msg-row '+role;const bub=document.createElement('div');bub.className='bubble '+role;bub.innerHTML=fmt(txt);if(role==='bot'){const wrap=document.createElement('div');wrap.appendChild(bub);if(mid!==undefined){const fb=document.createElement('div');fb.className='fb-row';fb.innerHTML=`<span style="font-size:11px;color:var(--color-text-tertiary)">有幫助嗎？</span><button class="fb-btn" onclick="giveFb(${mid},'g',this)"><i class="ti ti-thumb-up" style="font-size:12px;margin-right:2px" aria-hidden="true"></i>有幫助</button><button class="fb-btn" onclick="giveFb(${mid},'b',this)"><i class="ti ti-thumb-down" style="font-size:12px;margin-right:2px" aria-hidden="true"></i>沒幫助</button><button class="forward-btn" id="fwd-${mid}" onclick="forwardMsg(${mid},this)"><i class="ti ti-mail" style="font-size:12px;margin-right:2px" aria-hidden="true"></i>轉發給護理長</button>`;wrap.appendChild(fb);row.dataset.mid=mid;row.dataset.ans=txt;}row.appendChild(makeAv());row.appendChild(wrap);}else{const sp=document.createElement('div');sp.style.cssText='width:34px;flex-shrink:0;';row.appendChild(bub);row.appendChild(sp);}area.appendChild(row);area.scrollTop=area.scrollHeight;}

function giveFb(mid,type,btn){const row=document.querySelector(`[data-mid="${mid}"]`);btn.closest('.fb-row').querySelectorAll('.fb-btn').forEach(b=>b.className='fb-btn');btn.classList.add(type);const e={mid,type,ans:row?row.dataset.ans:'',time:new Date().toLocaleString('zh-TW')};const i=feedbacks.findIndex(f=>f.mid===mid);if(i>=0)feedbacks[i]={...feedbacks[i],...e};else feedbacks.push(e);}

async function forwardMsg(mid,btn){if(btn.classList.contains('sent'))return;const log=chatLogs.find(l=>l.id===mid);if(!log)return;const sub=encodeURIComponent('[AICU東元獅] 同仁問題轉發 - '+log.question.slice(0,30));const body=encodeURIComponent(`護理長您好，\n\n以下是同仁透過東元獅問答系統提出的問題，系統未能完整回答，煩請您協助解答。\n\n【問題】\n${log.question}\n\n【東元獅回答】\n${log.answer}\n\n【時間】\n${log.time}\n\n此信件由東元獅問答系統自動轉發。`);window.open(`mailto:${adminEmail}?subject=${sub}&body=${body}`,'_blank');btn.innerHTML='<i class="ti ti-check" style="font-size:12px;margin-right:2px" aria-hidden="true"></i>已轉發';btn.classList.add('sent');const fi=feedbacks.findIndex(f=>f.mid===mid);if(fi>=0)feedbacks[fi].forwarded=true;else feedbacks.push({mid,forwarded:true,time:new Date().toLocaleString('zh-TW')});showToast('已開啟郵件寄送視窗 📨');}

function addTyping(){const area=document.getElementById('chat-area');const row=document.createElement('div');row.className='msg-row bot';row.id='typing';const bub=document.createElement('div');bub.className='bubble bot';bub.innerHTML='<div class="typing-dots"><span></span><span></span><span></span></div>';row.appendChild(makeAv());row.appendChild(bub);area.appendChild(row);area.scrollTop=area.scrollHeight;}
function rmTyping(){const t=document.getElementById('typing');if(t)t.remove();}

async function send(txt){const inp=document.getElementById('msg-inp');const msg=(txt||inp.value).trim();if(!msg)return;inp.value='';inp.style.height='auto';addMsg(msg,'user');addTyping();const local=findAnswer(msg);let reply;if(local){await new Promise(r=>setTimeout(r,500));reply=local;}else{reply=await callClaude(msg);}rmTyping();const mid=++msgId;addMsg(reply,'bot',mid);chatLogs.push({id:mid,question:msg,answer:reply.replace(/<[^>]+>/g,''),time:new Date().toLocaleString('zh-TW')});}

function qk(query){
  // 統計點擊
  if(clickCounts.hasOwnProperty(query)){
    clickCounts[query]++;
    renderChips();
  }
  send(query);
}

document.getElementById('msg-inp').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById('msg-inp').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px';});

function showLogin(){document.getElementById('login-ov').style.display='flex';document.getElementById('pw').value='';document.getElementById('lerr').textContent='';setTimeout(()=>document.getElementById('pw').focus(),50);}
function hideLogin(){document.getElementById('login-ov').style.display='none';}
function doLogin(){if(document.getElementById('pw').value==='0717'){hideLogin();document.getElementById('app').style.display='none';document.getElementById('admin-panel').style.display='flex';tab('kb');}else{document.getElementById('lerr').textContent='密碼錯誤';document.getElementById('pw').value='';document.getElementById('pw').focus();}}
function showChat(){document.getElementById('admin-panel').style.display='none';document.getElementById('app').style.display='flex';}

function tab(t){activeTab=t;document.querySelectorAll('.atab').forEach((el,i)=>el.classList.toggle('on',['kb','top','logs','fb','cfg'][i]===t));renderAdmin();}
function renderAdmin(){const c=document.getElementById('adm-body');c.innerHTML='';if(activeTab==='kb')renderKB(c);else if(activeTab==='top')renderTop(c);else if(activeTab==='logs')renderLogs(c);else if(activeTab==='fb')renderFb(c);else renderCfg(c);}

function renderKB(c){const t=document.createElement('div');t.className='sec-ttl';t.textContent='新增知識';c.appendChild(t);const drop=document.createElement('div');drop.className='drop-z';drop.innerHTML='<i class="ti ti-upload" style="font-size:22px;margin-bottom:5px;display:block" aria-hidden="true"></i>拖曳文字檔案到此<br><span style="font-size:11px">或點擊選擇檔案（.txt .csv .md）</span>';drop.onclick=()=>document.getElementById('fp').click();drop.ondragover=e=>{e.preventDefault();drop.classList.add('ov');};drop.ondragleave=()=>drop.classList.remove('ov');drop.ondrop=e=>{e.preventDefault();drop.classList.remove('ov');if(e.dataTransfer.files[0])readF(e.dataTransfer.files[0]);};c.appendChild(drop);const fi=document.createElement('input');fi.type='file';fi.id='fp';fi.accept='.txt,.csv,.md';fi.style.display='none';fi.onchange=e=>{if(e.target.files[0])readF(e.target.files[0]);};c.appendChild(fi);const ta=document.createElement('textarea');ta.className='kb-ta';ta.id='kbt';ta.placeholder='或直接貼上 / 輸入知識內容（第一行將作為標題）...';c.appendChild(ta);const ab=document.createElement('button');ab.className='add-btn';ab.innerHTML='<i class="ti ti-plus" style="font-size:13px;margin-right:4px" aria-hidden="true"></i>加入知識庫';ab.onclick=addKB;c.appendChild(ab);const t2=document.createElement('div');t2.className='sec-ttl';t2.style.marginTop='4px';t2.textContent=`知識庫（${kbItems.length} 筆）`;c.appendChild(t2);if(!kbItems.length){const e=document.createElement('div');e.className='empty';e.textContent='知識庫目前是空的';c.appendChild(e);}kbItems.forEach((item,i)=>{const d=document.createElement('div');d.className='kb-item';d.innerHTML=`<div class="kb-hdr"><div class="kb-ttl">${item.title}</div><div class="kb-date">${item.date}</div><button class="del-btn" onclick="delKB(${i})" aria-label="刪除"><i class="ti ti-x" aria-hidden="true"></i></button></div><div class="kb-desc">${item.desc}</div>`;c.appendChild(d);});}

function renderTop(c){const t=document.createElement('div');t.className='sec-ttl';t.textContent='🔥 熱門問答排行（依點擊次數）';c.appendChild(t);const top15=[...ALL_TOPICS].sort((a,b)=>(clickCounts[b.query]||0)-(clickCounts[a.query]||0));top15.forEach((item,i)=>{const cnt=clickCounts[item.query]||0;const d=document.createElement('div');d.className='top-item';const rankClass=i===0?'top-rank gold':i===1?'top-rank silver':i===2?'top-rank bronze':'top-rank';d.innerHTML=`<div class="${rankClass}">${i+1}</div><div class="top-q">${item.label}</div><div class="top-cnt">${cnt} 次點擊</div>`;c.appendChild(d);});}

function readF(f){const r=new FileReader();r.onload=e=>{document.getElementById('kbt').value=e.target.result;};r.readAsText(f,'utf-8');}
function addKB(){const txt=document.getElementById('kbt').value.trim();if(!txt)return;const lines=txt.split('\n').filter(l=>l.trim());const title=lines[0].replace(/^[#\*\-\s]+/,'').slice(0,50)||'自訂知識';const desc=lines.slice(1).join(' ').slice(0,90)+(txt.length>90?'…':'');kbItems.push({title,content:txt,desc,date:new Date().toLocaleDateString('zh-TW')});document.getElementById('kbt').value='';showToast('✅ 知識已加入！');renderAdmin();}
function delKB(i){kbItems.splice(i,1);renderAdmin();}

function renderLogs(c){const t=document.createElement('div');t.className='sec-ttl';t.textContent=`問答記錄（${chatLogs.length} 則）`;c.appendChild(t);if(!chatLogs.length){const e=document.createElement('div');e.className='empty';e.textContent='還沒有問答記錄';c.appendChild(e);return;}[...chatLogs].reverse().forEach(log=>{const fb=feedbacks.find(f=>f.mid===log.id);const ftype=fb?.type||'';const fwd=fb?.forwarded;const badge=ftype==='g'?'<span class="fb-badge g">👍 有幫助</span>':ftype==='b'?'<span class="fb-badge b">👎 沒幫助</span>':fwd?'<span class="fb-badge fwd">📨 已轉發</span>':'<span class="fb-badge n">－</span>';const d=document.createElement('div');d.className='log-item';d.innerHTML=`<div class="log-q">${log.question}</div><div class="log-a">${log.answer.slice(0,120)}${log.answer.length>120?'…':''}</div><div class="log-meta"><span>${log.time}</span>${badge}</div>`;c.appendChild(d);});}

function renderFb(c){const good=feedbacks.filter(f=>f.type==='g').length,bad=feedbacks.filter(f=>f.type==='b').length,fwd=feedbacks.filter(f=>f.forwarded).length,total=chatLogs.length,pct=total>0?Math.round((good/total)*100):0;const t=document.createElement('div');t.className='sec-ttl';t.textContent='匿名回饋統計';c.appendChild(t);const row=document.createElement('div');row.className='stat-row';row.innerHTML=`<div class="stat-card"><div class="stat-n" style="color:#1D9E75">${good}</div><div class="stat-l">👍 有幫助</div></div><div class="stat-card"><div class="stat-n" style="color:#D85A30">${bad}</div><div class="stat-l">👎 沒幫助</div></div><div class="stat-card"><div class="stat-n">${total}</div><div class="stat-l">總問答數</div></div><div class="stat-card"><div class="stat-n" style="color:#534AB7">${pct}%</div><div class="stat-l">滿意率</div></div>`;c.appendChild(row);if(fwd){const r2=document.createElement('div');r2.className='stat-row';r2.innerHTML=`<div class="stat-card" style="flex:none;width:100%"><div class="stat-n" style="color:#3C3489">${fwd}</div><div class="stat-l">📨 已轉發護理長</div></div>`;c.appendChild(r2);}const t2=document.createElement('div');t2.className='sec-ttl';t2.style.marginTop='8px';t2.textContent='負面回饋明細';c.appendChild(t2);const bads=feedbacks.filter(f=>f.type==='b');if(!bads.length){const e=document.createElement('div');e.className='empty';e.textContent='目前沒有負面回饋 🎉';c.appendChild(e);return;}bads.forEach(f=>{const d=document.createElement('div');d.className='log-item';d.innerHTML=`<div style="font-size:11px;color:#D85A30;margin-bottom:3px;font-weight:500">👎 同仁覺得沒幫助</div><div class="log-a">${(f.ans||'').slice(0,100)}…</div><div class="log-meta">${f.time}</div>`;c.appendChild(d);});}

function renderCfg(c){const t=document.createElement('div');t.className='sec-ttl';t.textContent='轉發護理長信箱設定';c.appendChild(t);const row=document.createElement('div');row.className='email-row';const inp=document.createElement('input');inp.type='email';inp.className='email-inp';inp.id='email-inp';inp.value=adminEmail;inp.placeholder='護理長 Email...';const btn=document.createElement('button');btn.className='save-btn';btn.textContent='儲存';btn.onclick=()=>{const v=document.getElementById('email-inp').value.trim();if(!v)return;adminEmail=v;showToast('✅ 信箱已儲存：'+v);};row.appendChild(inp);row.appendChild(btn);c.appendChild(row);const note=document.createElement('div');note.style.cssText='font-size:12px;color:var(--color-text-secondary);line-height:1.5;';note.textContent='當同仁點擊「轉發給護理長」按鈕時，系統會開啟電子郵件視窗，將對話紀錄寄送至此信箱。';c.appendChild(note);}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.style.display='block';setTimeout(()=>{t.style.display='none';},2500);}

window.addEventListener('load',()=>{
  initLionImgs();
  renderChips();
  const area=document.getElementById('chat-area');
  const tl=document.createElement('div');tl.className='time-lbl';tl.textContent='今天';area.appendChild(tl);
  setTimeout(()=>{addMsg(`嗨嗨！我是萌萌的東元獅 🦁\n\nAICU 同仁的專屬小幫手，你可以問我：\n- 在職進修 / 出差 / 公出 申請流程\n- 能力進階、報告繳交時間\n- 管路效期、三班工作常規、生命徵象\n- 緊急應變（999/RRT/333/黑色/綠色）\n- ZOLL低溫、腹內壓、清消流程\n- 病人暴力處置、圖書館帳密、密碼規定\n\n點下面的熱門按鈕，或直接輸入問題！😊`,'bot');},300);
});
</script>
