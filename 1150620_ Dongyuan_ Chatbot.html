<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萌萌的東仔 - AICU 小幫手</title>
<style>
  /* ===== 全局重置與變數 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal-primary: #3BBFBF;
    --teal-dark: #2A9D9D;
    --teal-light: #E8F8F8;
    --teal-btn: #2AACAC;
    --bg-app: #f0f4f8;
    --bg-chat: #f5f8fa;
    --white: #ffffff;
    --text-dark: #2d3748;
    --text-mid: #4a5568;
    --text-light: #718096;
    --bot-bubble: #ffffff;
    --user-bubble: #3BBFBF;
    --chip-bg: #e6f7f7;
    --chip-border: #b2e8e8;
    --chip-text: #2A9D9D;
    --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 16px rgba(59,191,191,0.15);
    --shadow-lg: 0 8px 32px rgba(59,191,191,0.2);
    --radius-sm: 8px;
    --radius-md: 16px;
    --radius-lg: 24px;
    --radius-full: 9999px;
  }

  body {
    font-family: 'Segoe UI', -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif;
    background: var(--bg-app);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 16px;
  }

  /* ===== 主容器：手機直立 392x582 ===== */
  #app-wrapper {
    width: 392px;
    height: 582px;
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
  }

  /* ===== Header ===== */
  #chat-header {
    background: linear-gradient(135deg, var(--teal-primary) 0%, var(--teal-dark) 100%);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    position: relative;
  }

  #header-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    overflow: hidden;
    border: 2px solid rgba(255,255,255,0.4);
  }

  #header-avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  #header-info { flex: 1; }
  #header-info .title {
    color: var(--white);
    font-size: 14px;
    font-weight: 700;
    line-height: 1.2;
  }
  #header-info .subtitle {
    color: rgba(255,255,255,0.85);
    font-size: 11px;
    margin-top: 1px;
  }

  #admin-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  #admin-btn:hover { background: rgba(255,255,255,0.35); }

  /* ===== 聊天訊息區 ===== */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px 8px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg-chat);
    scroll-behavior: smooth;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #c7e8e8; border-radius: 4px; }

  /* ===== 訊息泡泡 ===== */
  .msg-row {
    display: flex;
    align-items: flex-end;
    gap: 6px;
  }
  .msg-row.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--teal-light);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
    overflow: hidden;
    border: 1.5px solid #b2e8e8;
  }
  .msg-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .msg-content { max-width: 78%; display: flex; flex-direction: column; gap: 4px; }
  .msg-row.user .msg-content { align-items: flex-end; }

  .msg-bubble {
    padding: 9px 12px;
    border-radius: 16px;
    font-size: 13px;
    line-height: 1.6;
    word-break: break-word;
    box-shadow: var(--shadow-sm);
  }
  .msg-bubble.bot {
    background: var(--bot-bubble);
    color: var(--text-dark);
    border-bottom-left-radius: 4px;
    border: 1px solid #e2f2f2;
  }
  .msg-bubble.user {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-bubble a { color: var(--teal-dark); text-decoration: underline; }
  .msg-bubble.user a { color: rgba(255,255,255,0.9); }

  .msg-time {
    font-size: 10px;
    color: var(--text-light);
    padding: 0 4px;
  }

  /* ===== 滿意度按鈕 ===== */
  .feedback-row {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    margin-top: 2px;
  }
  .fb-btn {
    font-size: 10px;
    padding: 3px 7px;
    border-radius: var(--radius-full);
    border: 1px solid #c7e8e8;
    background: var(--white);
    color: var(--chip-text);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .fb-btn:hover { background: var(--teal-light); }
  .fb-btn.active-good { background: #d1fae5; border-color: #6ee7b7; color: #065f46; }
  .fb-btn.active-bad { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }
  .fb-btn.active-report { background: #fef9c3; border-color: #fde68a; color: #92400e; }
  .fb-btn:disabled { cursor: default; opacity: 0.7; }

  /* ===== 打字中動畫 ===== */
  .typing-indicator { display: flex; gap: 4px; padding: 10px 14px; align-items: center; }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--teal-primary);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(1) { animation-delay: 0s; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  /* ===== Chips 快捷提問 ===== */
  #chips-area {
    padding: 6px 12px;
    background: var(--white);
    border-top: 1px solid #e8f4f4;
    flex-shrink: 0;
  }
  #chips-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: thin;
    scrollbar-color: #b2e8e8 transparent;
    cursor: grab;
  }
  #chips-scroll:active { cursor: grabbing; }
  #chips-scroll::-webkit-scrollbar { height: 4px; display: block; }
  #chips-scroll::-webkit-scrollbar-thumb { background: #b2e8e8; border-radius: 4px; }
  #chips-scroll::-webkit-scrollbar-track { background: transparent; }
  .chip {
    flex-shrink: 0;
    padding: 4px 10px;
    border-radius: var(--radius-full);
    background: var(--chip-bg);
    border: 1px solid var(--chip-border);
    color: var(--chip-text);
    font-size: 11px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip:hover { background: var(--teal-primary); color: white; border-color: var(--teal-primary); }

  /* ===== 輸入框 ===== */
  #input-area {
    padding: 8px 10px;
    background: var(--white);
    border-top: 1px solid #e8f4f4;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
  }
  #user-input {
    flex: 1;
    padding: 9px 14px;
    border: 1.5px solid #c7e8e8;
    border-radius: var(--radius-full);
    font-size: 13px;
    color: var(--text-dark);
    outline: none;
    background: var(--bg-chat);
    transition: border-color 0.2s;
    font-family: inherit;
  }
  #user-input:focus { border-color: var(--teal-primary); background: white; }
  #user-input::placeholder { color: #a0aec0; }
  #send-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: var(--teal-primary);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    flex-shrink: 0;
  }
  #send-btn:hover { background: var(--teal-dark); }
  #send-btn:active { transform: scale(0.92); }

  /* ===== 遮罩層 ===== */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(2px);
  }
  .overlay.hidden { display: none; }

  /* ===== 密碼對話框 ===== */
  .modal-box {
    background: white;
    border-radius: var(--radius-md);
    padding: 24px 20px;
    width: 280px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    text-align: center;
  }
  .modal-box h3 { font-size: 15px; color: var(--text-dark); margin-bottom: 6px; }
  .modal-box p { font-size: 12px; color: var(--text-light); margin-bottom: 14px; }
  .modal-input {
    width: 100%;
    padding: 9px 14px;
    border: 1.5px solid #c7e8e8;
    border-radius: var(--radius-sm);
    font-size: 14px;
    text-align: center;
    letter-spacing: 4px;
    outline: none;
    font-family: inherit;
  }
  .modal-input:focus { border-color: var(--teal-primary); }
  .modal-btns { display: flex; gap: 8px; margin-top: 12px; }
  .btn-cancel {
    flex: 1;
    padding: 9px;
    border: 1.5px solid #c7e8e8;
    border-radius: var(--radius-sm);
    background: white;
    color: var(--text-mid);
    font-size: 13px;
    cursor: pointer;
  }
  .btn-confirm {
    flex: 1;
    padding: 9px;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--teal-primary);
    color: white;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
  }
  .modal-error { font-size: 11px; color: #e53e3e; margin-top: 6px; display: none; }

  /* ===== 後台面板 ===== */
  #admin-panel {
    position: absolute;
    inset: 0;
    background: var(--white);
    z-index: 200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #admin-panel.hidden { display: none; }

  #admin-header {
    background: linear-gradient(135deg, var(--teal-primary), var(--teal-dark));
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  #admin-header h2 { color: white; font-size: 14px; font-weight: 700; flex: 1; }
  #admin-close {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    border: none;
    color: white;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* 分頁 Tabs */
  #admin-tabs {
    display: flex;
    background: var(--bg-chat);
    border-bottom: 2px solid #e8f4f4;
    flex-shrink: 0;
  }
  .admin-tab {
    flex: 1;
    padding: 9px 4px;
    border: none;
    background: transparent;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .admin-tab.active { color: var(--teal-primary); border-bottom-color: var(--teal-primary); }

  /* 分頁內容 */
  .admin-content {
    flex: 1;
    overflow-y: auto;
    padding: 14px;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  .admin-content.active { display: flex; }
  .admin-content::-webkit-scrollbar { width: 4px; }
  .admin-content::-webkit-scrollbar-thumb { background: #c7e8e8; border-radius: 4px; }

  /* 後台表單元素 */
  .admin-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-mid);
    margin-bottom: 4px;
    display: block;
  }
  .admin-input {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid #c7e8e8;
    border-radius: var(--radius-sm);
    font-size: 13px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .admin-input:focus { border-color: var(--teal-primary); }
  .admin-textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1.5px solid #c7e8e8;
    border-radius: var(--radius-sm);
    font-size: 12px;
    outline: none;
    font-family: inherit;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.2s;
  }
  .admin-textarea:focus { border-color: var(--teal-primary); }

  .btn-primary {
    padding: 8px 16px;
    background: var(--teal-primary);
    color: white;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    font-family: inherit;
  }
  .btn-primary:hover { background: var(--teal-dark); }
  .btn-danger {
    padding: 4px 10px;
    background: #fff5f5;
    color: #e53e3e;
    border: 1px solid #fed7d7;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-danger:hover { background: #fed7d7; }
  .btn-sm {
    padding: 4px 8px;
    background: var(--teal-light);
    color: var(--teal-dark);
    border: 1px solid #b2e8e8;
    border-radius: 6px;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }

  /* 拖曳上傳區 */
  #drop-zone {
    border: 2px dashed #b2e8e8;
    border-radius: var(--radius-md);
    padding: 20px;
    text-align: center;
    color: var(--text-light);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--teal-light);
  }
  #drop-zone.drag-over { border-color: var(--teal-primary); background: #d1f2f2; }
  #drop-zone .drop-icon { font-size: 28px; margin-bottom: 6px; }

  /* 知識庫條目列表 */
  .kb-item {
    background: var(--bg-chat);
    border: 1px solid #e2f2f2;
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 12px;
  }
  .kb-item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .kb-item-title { font-weight: 700; color: var(--text-dark); font-size: 12px; }
  .kb-item-date { font-size: 10px; color: var(--text-light); white-space: nowrap; }
  .kb-item-body { color: var(--text-mid); margin-top: 4px; line-height: 1.5; }
  .kb-item-footer { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .kb-keywords { font-size: 10px; color: var(--teal-dark); background: var(--teal-light); padding: 2px 6px; border-radius: 4px; }

  /* 統計卡片 */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--teal-light);
    border: 1px solid #b2e8e8;
    border-radius: var(--radius-sm);
    padding: 10px;
    text-align: center;
  }
  .stat-card .val { font-size: 22px; font-weight: 800; color: var(--teal-dark); }
  .stat-card .lbl { font-size: 10px; color: var(--text-mid); margin-top: 2px; }
  .stat-card.full { grid-column: span 2; background: linear-gradient(135deg, #e6f7f7, #d1f2f2); }

  /* 問答記錄 */
  .log-item {
    background: var(--bg-chat);
    border: 1px solid #e2f2f2;
    border-radius: var(--radius-sm);
    padding: 10px;
    font-size: 11px;
  }
  .log-time { color: var(--text-light); margin-bottom: 4px; }
  .log-q { font-weight: 700; color: var(--text-dark); }
  .log-a { color: var(--text-mid); margin-top: 3px; }
  .log-footer { display: flex; justify-content: flex-end; margin-top: 6px; }

  /* 分隔線 */
  .divider { border: none; border-top: 1px solid #e2f2f2; }

  /* section 標題 */
  .section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--teal-dark);
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .section-title::before { content: ''; display: block; width: 3px; height: 14px; background: var(--teal-primary); border-radius: 2px; }

  /* toast 訊息 */
  #toast {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(42,157,157,0.92);
    color: white;
    padding: 7px 16px;
    border-radius: var(--radius-full);
    font-size: 12px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="app-wrapper">

  <!-- ===== HEADER ===== -->
  <div id="chat-header">
    <div id="header-avatar">
      <img id="lion-avatar-header" src="" alt="東仔" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">
    </div>
    <div id="header-info">
      <div class="title">萌萌的東仔（問答機器）</div>
      <div class="subtitle">AICU 同仁專屬小幫手</div>
    </div>
    <button id="admin-btn" title="後台管理" onclick="openAdminPrompt()">⚙️</button>
  </div>

  <!-- ===== 聊天訊息區 ===== -->
  <div id="chat-messages"></div>

  <!-- ===== Chips 快捷提問 ===== -->
  <div id="chips-area">
    <div id="chips-scroll">
      <button class="chip" onclick="sendChip('在職進修')">在職進修</button>
      <button class="chip" onclick="sendChip('出差/公出')">出差/公出</button>
      <button class="chip" onclick="sendChip('能力進階')">能力進階</button>
      <button class="chip" onclick="sendChip('報告繳交')">報告繳交</button>
      <button class="chip" onclick="sendChip('腹內壓')">腹內壓</button>
      <button class="chip" onclick="sendChip('ZOLL')">ZOLL</button>
      <button class="chip" onclick="sendChip('暴力處置')">暴力處置</button>
      <button class="chip" onclick="sendChip('清消')">清消</button>
      <button class="chip" onclick="sendChip('密碼規定')">密碼規定</button>
      <button class="chip" onclick="sendChip('圖書館帳密')">圖書館帳密</button>
    </div>
  </div>

  <!-- ===== 輸入區 ===== -->
  <div id="input-area">
    <input type="text" id="user-input" placeholder="請輸入您的問題…" autocomplete="off">
    <button id="send-btn" onclick="handleSend()">➤</button>
  </div>

  <!-- ===== 密碼驗證遮罩 ===== -->
  <div class="overlay hidden" id="password-overlay">
    <div class="modal-box">
      <div style="font-size:28px;margin-bottom:8px;">🔐</div>
      <h3>後台管理登入</h3>
      <p>請輸入管理員密碼</p>
      <input type="password" class="modal-input" id="admin-pw-input" placeholder="****" maxlength="20">
      <div class="modal-error" id="pw-error">密碼錯誤，請再試一次</div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closePasswordOverlay()">取消</button>
        <button class="btn-confirm" onclick="verifyPassword()">確認登入</button>
      </div>
    </div>
  </div>

  <!-- ===== 後台管理面板 ===== -->
  <div id="admin-panel" class="hidden">
    <div id="admin-header">
      <div style="font-size:18px;">⚙️</div>
      <h2>後台管理系統</h2>
      <button id="admin-close" onclick="closeAdmin()">✕</button>
    </div>

    <div id="admin-tabs">
      <button class="admin-tab active" onclick="switchTab('kb')">📚 知識庫</button>
      <button class="admin-tab" onclick="switchTab('logs')">📊 記錄統計</button>
      <button class="admin-tab" onclick="switchTab('settings')">🔧 系統設定</button>
    </div>

    <!-- 知識庫分頁 -->
    <div class="admin-content active" id="tab-kb">
      <div class="section-title">新增知識條目</div>

      <!-- 拖曳上傳 -->
      <div id="drop-zone" onclick="document.getElementById('file-upload').click()"
        ondragover="event.preventDefault();this.classList.add('drag-over')"
        ondragleave="this.classList.remove('drag-over')"
        ondrop="handleFileDrop(event)">
        <div class="drop-icon">📂</div>
        <div>拖曳或點擊上傳 .txt / .csv / .md 檔案</div>

document.addEventListener('DOMContentLoaded', () => {
  const hImg = document.getElementById('lion-avatar-header');
  if (hImg) { hImg.onerror = null; hImg.src = lionDataUrl; }
});

// 設定 header 頭像
window.addEventListener('load', () => {
  // 設定所有東元獅頭像
  document.querySelectorAll('img[data-lion]').forEach(img => {
    img.src = lionDataUrl;
    img.onerror = null;
  });
  const hImg = document.getElementById('lion-avatar-header');
  if (hImg) {
    hImg.onerror = null;
    hImg.src = lionDataUrl;
  }
  renderKBList();
  renderLogList();
  updateStats();
  loadSettings();
  // 歡迎訊息
  appendBotMsg('哈囉！我是 AICU 的小幫手東仔。有關在職進修、出差公出或臨床技術流程等問題都可以問我喔！👇 下方也有常用熱門鍵可以快速提問。', false);
});

/* =====================================================
   聊天核心：發送與接收
   ===================================================== */
const chatArea = document.getElementById('chat-messages');
const inputEl = document.getElementById('user-input');

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

function handleSend() {
  const text = inputEl.value.trim();
  if (!text) return;
  inputEl.value = '';
  sendMessage(text);
}

function sendChip(text) {
  inputEl.value = '';
  sendMessage(text);
}

async function sendMessage(text) {
  appendUserMsg(text);
  const typingId = appendTyping();

  // 稍微延遲模擬思考
  await sleep(400);

  // === 本地知識庫搜尋（忽略大小寫）===
  const results = searchKB(text);

  let answer = '';
  let source = 'kb';

  if (results.length > 0) {
    if (results.length === 1) {
      answer = `📋 **${results[0].title}**\n\n${results[0].content}`;
    } else {
      answer = `找到 ${results.length} 筆相關資料：\n\n` +
        results.map((r, i) => `**${i+1}. ${r.title}**\n${r.content}`).join('\n\n---\n\n');
    }
  } else {
    // === Claude API 兜底 ===
    const apiKey = settings.apiKey;
    if (apiKey) {
      try {
        answer = await callClaudeAPI(text, apiKey);
        source = 'api';
      } catch {
        answer = null;
      }
    }
    if (!answer) {
      answer = '此系統未具備此知識，建議洽詢主管或相關單位喔 🙏';
      source = 'none';
    }
  }

  removeTyping(typingId);
  const msgId = appendBotMsg(answer, true);

  // 記錄問答
  const now = new Date();
  const logEntry = {
    id: Date.now(),
    time: formatTime(now),
    q: text,
    a: answer.substring(0, 120) + (answer.length > 120 ? '…' : '')
  };
  chatLogs.push(logEntry);
  lsSet('logs', chatLogs);
  stats.total++;
  lsSet('stats', stats);

  sessionHistory.push({ time: formatTime(now), q: text, a: answer });
}

/* ===== 本地知識庫搜尋 ===== */
function searchKB(query) {
  const q = query.toLowerCase().replace(/\s+/g, '');
  return knowledgeBase.filter(entry => {
    const inTitle = entry.title.toLowerCase().includes(q);
    const inContent = entry.content.toLowerCase().includes(q);
    const inKeywords = (entry.keywords || []).some(k => k.toLowerCase().includes(q) || q.includes(k.toLowerCase()));
    // 也嘗試逐字元搜尋
    const chars = q.split('');
    const inAny = chars.some(c => entry.title.toLowerCase().includes(c) || entry.content.toLowerCase().includes(c) || (entry.keywords||[]).some(k=>k.toLowerCase().includes(c)));
    return inTitle || inContent || inKeywords;
  });
}

/* ===== Claude API 兜底呼叫 ===== */
async function callClaudeAPI(userMsg, apiKey) {
  // 注意：此處的 API Key 由後台設定注入，不在前端明碼寫死
  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 512,
      system: `你是東元綜合醫院 AICU（成人加護病房）的專屬小幫手「東仔」，個性親切萌萌的。
請用繁體中文、溫暖簡短的語氣回答護理同仁的問題，聚焦在臨床護理、醫院規定、在職進修等相關主題。
回答請控制在 150 字以內，如需列點請使用簡潔條列。`,
      messages: [{ role: 'user', content: userMsg }]
    })
  });
  if (!response.ok) throw new Error('API error');
  const data = await response.json();
  return data.content?.[0]?.text || null;
}

/* =====================================================
   格式化工具函數
   ===================================================== */
function formatBotText(text) {
  // 轉義 HTML，處理換行、連結、粗體
  let s = escapeHtml(text);
  // 粗體 **text**
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // URL 轉連結
  s = s.replace(/(https?:\/\/[^\s<>"']+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  // 換行
  s = s.replace(/\n/g, '<br>');
  // 分隔線
  s = s.replace(/---/g, '<hr style="border:none;border-top:1px solid #e2f2f2;margin:8px 0;">');
  return s;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTime(d) {
  return d.getFullYear() + '/' + pad(d.getMonth()+1) + '/' + pad(d.getDate()) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}

function formatTimeShort(d) {
  return pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function pad(n) { return n < 10 ? '0' + n : n; }

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function scrollBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

/* ===== 檔案上傳解析 ===== */
function handleFileUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  parseFile(file);
  event.target.value = '';
}

function handleFileDrop(event) {
  event.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = event.dataTransfer.files[0];
  if (file) parseFile(file);
}

function parseFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const text = e.target.result;
    // 自動解析：第一行為標題，其餘為內容
    const lines = text.split('\n');
    let title = file.name.replace(/\.(txt|csv|md)$/i, '');
    let content = text;
    let keywords = '';

    // 嘗試偵測 markdown 標題
    if (lines[0].startsWith('#')) {
      title = lines[0].replace(/^#+\s*/, '').trim();
      content = lines.slice(1).join('\n').trim();
    }

    document.getElementById('kb-title').value = title;
    document.getElementById('kb-content').value = content;
    showToast('檔案已讀取，請確認後加入知識庫');
  };
  reader.readAsText(file, 'UTF-8');
}

  const rate = total > 0 ? Math.round((good / (good + bad || 1)) * 100) : 0;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-good').textContent = good;
  document.getElementById('stat-bad').textContent = bad;
  document.getElementById('stat-report').textContent = report;
  document.getElementById('stat-satisfaction').textContent =

}

function downloadText(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

  // 滑鼠滾輪橫向滾動
  el.addEventListener('wheel', function(e) {
    if (e.deltaY !== 0) {
      e.preventDefault();
      el.scrollLeft += e.deltaY * 1.5;
    }
  }, { passive: false });

  // 拖曳滾動
  let isDown = false, startX, scrollLeft;
  el.addEventListener('mousedown', e => {
    isDown = true;
    el.style.cursor = 'grabbing';
    startX = e.pageX - el.offsetLeft;
    scrollLeft = el.scrollLeft;
  });
  el.addEventListener('mouseleave', () => { isDown = false; el.style.cursor = 'grab'; });
  el.addEventListener('mouseup', () => { isDown = false; el.style.cursor = 'grab'; });
  el.addEventListener('mousemove', e => {
    if (!isDown) return;
    e.preventDefault();
    const x = e.pageX - el.offsetLeft;
    el.scrollLeft = scrollLeft - (x - startX);
  });

  // 觸控滑動（手機）
  let touchStartX, touchScrollLeft;
  el.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].pageX;
    touchScrollLeft = el.scrollLeft;
  }, { passive: true });
  el.addEventListener('touchmove', e => {
    const diff = touchStartX - e.touches[0].pageX;
    el.scrollLeft = touchScrollLeft + diff;
  }, { passive: true });
})();

</script>
</body>
</html>
